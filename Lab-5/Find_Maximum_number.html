<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter a Size Of array: -"))
        let arr=[]
        for(let i=0;i<n;i++){
            arr[i]=parseInt(prompt("Enter array["+i+"]"))
        }
        let max=0
        for(let i=0;i<n;i++){
            if(arr[i]>max){
                max=arr[i];
            }
        }
        document.write(max)
    </script>
</body>
</html>
