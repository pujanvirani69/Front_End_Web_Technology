<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter a Number of row: "))
        for(let i=1;i<=n1;i++){
            for(let j=5-i+1;j>=1;j--){
                document.write(j)
            }
            document.write("<br\>")
        }
    </script>
</body>
</html>
