<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter number of rows:  "))
        let temp=0
        for(let i=1;i<=n1;i++){
            for(let j=1;j<=i;j++){
                temp++
                if(temp%2==0){
                    document.write("0 ")
                }
                else{
                    document.write("1 ")
                }
            }
            document.write("<br\>")
        }
    </script>
</body>
</html>
