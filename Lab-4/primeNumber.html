<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt('Enter a starting Number of prime Number: -')) 
        let n2=parseInt(prompt('Enter a Ending Number of prime Number: -')) 
        let prime=0
        let i=n1
        let j=2
        if(n1==0){
            document.write("start the number 1")
        }
        else{
            for(i=n1;i<=n2;i++){
                prime=0
                for(j=2;j<i;j++){
                    if(i%j==0){
                        prime++
                    }
                }
                if(prime==0){
                    document.write(","+i)
                }
            }
        }
    </script>
</body>
</html>
