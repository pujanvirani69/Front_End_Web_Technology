<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter n1 number from factorial : "))
        let ans =1
        for(let i=1;i<=n1;i++){
            ans=ans*i
        }
        alert("Ans = "+ans)
    </script>
</body>
</html>
