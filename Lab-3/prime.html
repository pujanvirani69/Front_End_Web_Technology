<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1=parseInt(prompt("Enter Number n1 to check prime : "))
        let prime = 0 
        for(let i=2;i<n1;i++){
            if(n1%i==0){
                prime++
            }
        }
        if(prime==0){
            alert("Prime Number: ")
        }
        else{
            alert("Not prime Number: ")
        }
    </script>
</body>
</html>
